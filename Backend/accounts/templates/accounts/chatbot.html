<!DOCTYPE html>
<html>
<head>

<title>AI Farmer Chatbot</title>

<style>

body{
background:#eef5ee;
font-family:Arial;
}

.container{
width:70%;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px gray;
text-align:center;
}

textarea{
width:90%;
height:120px;
padding:10px;
font-size:17px;
}

button{
background:#2e7d32;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.answer{
margin-top:25px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Farmer Chatbot</h1>

<form method="POST">

{% csrf_token %}

<textarea
name="question"
placeholder="Ask your agriculture question..."></textarea>

<br><br>

<button type="submit">

Ask AI

</button>

</form>

{% if answer %}

<div class="answer">

<h2>🤖 AI Response</h2>

<p>{{ answer }}</p>

</div>

{% endif %}

</div>

</body>

</html>
