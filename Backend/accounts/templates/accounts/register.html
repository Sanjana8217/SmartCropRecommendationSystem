<!DOCTYPE html>

<html>

<head>

<title>Register - Smart Crop Recommendation System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef5ee;
}

.header{
background:linear-gradient(135deg,#2e7d32,#43a047);
color:white;
text-align:center;
padding:25px;
}

.header h1{
font-size:40px;
}

.container{
width:500px;
margin:50px auto;
}

.register-box{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0px 0px 15px rgba(0,0,0,0.15);
}

.register-box h2{
text-align:center;
color:#2e7d32;
margin-bottom:25px;
font-size:32px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:17px;
}

button{
width:100%;
background:#2e7d32;
color:white;
border:none;
padding:14px;
border-radius:8px;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.login-link{
text-align:center;
margin-top:20px;
font-size:18px;
}

.login-link a{
text-decoration:none;
color:#2e7d32;
font-weight:bold;
}

.error{
color:red;
text-align:center;
font-size:18px;
margin-bottom:15px;
}

.success{
color:green;
text-align:center;
font-size:18px;
margin-bottom:15px;
}

.home-btn{
display:block;
text-align:center;
margin-top:20px;
padding:12px;
background:#43a047;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;
}

.home-btn:hover{
background:#2e7d32;
}

</style>

</head>

<body>

<div class="header">
<h1>🌾 Smart Crop Recommendation System</h1>
</div>

<div class="container">

<div class="register-box">

<h2>📝 Farmer Registration</h2>

{% if error %}

<div class="error">
{{ error }}
</div>
{% endif %}

{% if success %}

<div class="success">
{{ success }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="fullname"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="text"
name="username"
placeholder="Choose Username"
required>

<input
type="password"
name="password"
placeholder="Create Password"
required>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

<button type="submit">
Register Account
</button>

</form>

<div class="login-link">

Already have an account?

<br><br>

<a href="/login/">
Login Here
</a>

</div>

<a href="/" class="home-btn">
🏠 Back To Home
</a>

</div>

</div>

</body>

</html>
